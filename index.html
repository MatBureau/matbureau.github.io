              <span class="opacity-70" x-text="l.level"></span>

    <p>© <span x-text="new Date().getFullYear()"></span> <span x-text="data.name"></span></p>
  </footer>

  <script>
    function chips(list = []) {
      return list.map(t => `<span class="inline-flex items-center rounded-full border px-3 py-1 text-sm bg-slate-50 dark:bg-slate-800">${t}</span>`).join("");
    }
    function formatDateRange(start, end) {
      return `${start} – ${end || "Aujourd'hui"}`;
    }
    function ui() {
      return { data: profileData };
    }
  </script>
