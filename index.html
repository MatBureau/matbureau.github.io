</head>
<body x-data="ui()" x-init="render()" class="bg-white text-slate-800 antialiased dark:bg-slate-900 dark:text-slate-100">

  <header class="sticky top-0 z-40 backdrop-blur border-b border-slate-200/60 dark:border-slate-700/60 bg-white/70 dark:bg-slate-900/50">
    <div class="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
      <a href="#top" class="font-semibold tracking-tight">Mathis Bureau</a>
      <nav class="hidden md:flex gap-6 text-sm opacity-80">
        <a href="#about" class="hover:opacity-100">À propos</a>
        <a href="#skills" class="hover:opacity-100">Compétences</a>
        <a href="#experience" class="hover:opacity-100">Expériences</a>
        <a href="#education" class="hover:opacity-100">Formation</a>
        <a href="#certifications" class="hover:opacity-100">Certifications</a>
        <a href="#projects" class="hover:opacity-100">Projets</a>
      </nav>
    </div>
  </header>

  <section id="top" class="relative">
    <div class="mx-auto max-w-6xl px-4 pt-14 pb-10 grid md:grid-cols-[1.1fr,1fr] items-center gap-10">
      <div>
        <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight leading-[1.15]" x-text="data.name"></h1>
        <p class="mt-3 text-lg md:text-xl opacity-80 font-medium text-sky-600 dark:text-sky-400" x-text="data.title"></p>
        <div class="mt-6 flex flex-wrap gap-2">
          <a x-bind:href="'mailto:'+data.email" class="inline-flex items-center gap-2 rounded-full border px-3 py-1.5 text-sm hover:shadow-sm">✉️ <span x-text="data.email"></span></a>
          <a x-bind:href="data.links.linkedin" target="_blank" rel="noreferrer" class="inline-flex items-center gap-2 rounded-full border px-3 py-1.5 text-sm hover:shadow-sm">in LinkedIn</a>
          <a x-bind:href="data.links.github" target="_blank" rel="noreferrer" class="inline-flex items-center gap-2 rounded-full border px-3 py-1.5 text-sm hover:shadow-sm">GitHub</a>
          <span class="inline-flex items-center gap-2 rounded-full border px-3 py-1.5 text-sm">📍 <span x-text="data.location"></span></span>
        </div>
      </div>
    </div>
  </section>

  <section id="about" class="py-10 border-t border-slate-200/60 dark:border-slate-700/60">
    <div class="mx-auto max-w-6xl px-4 grid md:grid-cols-[1fr,2fr] gap-8">
      <h2 class="text-xl md:text-2xl font-bold">À propos</h2>
      <p class="leading-relaxed opacity-90" x-text="data.about"></p>
    </div>
  </section>

  <section id="skills" class="py-10 border-t border-slate-200/60 dark:border-slate-700/60">
    <div class="mx-auto max-w-6xl px-4">
      <h2 class="text-xl md:text-2xl font-bold mb-6">Compétences techniques</h2>
      <div class="grid md:grid-cols-3 gap-6">
        <div>
          <h3 class="font-semibold mb-2 opacity-80">Back-end & Arch</h3>
          <div class="flex flex-wrap gap-2" x-html="chips(data.skills.backend)"></div>
        </div>
        <div>
          <h3 class="font-semibold mb-2 opacity-80">Web & Data</h3>
          <div class="flex flex-wrap gap-2" x-html="chips(data.skills.web)"></div>
        </div>
        <div>
          <h3 class="font-semibold mb-2 opacity-80">Cyber & Forensics</h3>
          <div class="flex flex-wrap gap-2" x-html="chips(data.skills.cyber)"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="experience" class="py-10 border-t border-slate-200/60 dark:border-slate-700/60">
    <div class="mx-auto max-w-6xl px-4">
      <h2 class="text-xl md:text-2xl font-bold mb-6">Expériences professionnelles</h2>
      <ol class="relative border-s border-slate-200 dark:border-slate-700">
        <template x-for="exp in data.experiences" :key="exp.company + exp.start">
          <li class="ms-6 py-6">
            <span class="absolute -start-3 flex h-6 w-6 items-center justify-center rounded-full bg-sky-500 text-white text-xs">★</span>
            <div class="flex flex-wrap items-baseline gap-3">
              <h3 class="font-semibold" x-text="exp.role"></h3>
              <span class="opacity-70" x-text="'— ' + exp.company"></span>
              <span class="ms-auto text-sm opacity-70" x-text="formatDateRange(exp.start, exp.end)"></span>
            </div>
            <div class="mt-2 text-sm opacity-80" x-text="exp.location"></div>
            <ul class="mt-3 list-disc ps-5 space-y-1">
              <template x-for="a in exp.achievements" :key="a">
                <li x-text="a"></li>
              </template>
            </ul>
            <div class="mt-3 flex flex-wrap gap-2" x-html="chips(exp.tech)"></div>
          </li>
        </template>
      </ol>
    </div>
  </section>

  <section id="education" class="py-10 border-t border-slate-200/60 dark:border-slate-700/60">
    <div class="mx-auto max-w-6xl px-4">
      <h2 class="text-xl md:text-2xl font-bold mb-6">Parcours scolaire</h2>
      <div class="grid md:grid-cols-2 gap-6">
        <template x-for="e in data.education" :key="e.school + e.start">
          <article class="rounded-2xl border p-4 hover:shadow transition">
            <h3 class="font-semibold" x-text="e.school"></h3>
            <p class="opacity-80" x-text="e.program"></p>
            <p class="mt-1 text-sm opacity-70" x-text="formatDateRange(e.start, e.end)"></p>
          </article>
        </template>
      </div>
    </div>
  </section>

  <section id="certifications" class="py-10 border-t border-slate-200/60 dark:border-slate-700/60">
    <div class="mx-auto max-w-6xl px-4">
      <h2 class="text-xl md:text-2xl font-bold mb-6">Certifications</h2>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="c in data.certifications" :key="c.title">
          <article class="rounded-2xl border p-4 hover:shadow transition">
            <h3 class="font-semibold text-lg" x-text="c.title"></h3>
            <div class="mt-2 flex justify-between items-center text-sm opacity-80">
              <span x-text="c.issuer"></span>
              <span x-text="c.date"></span>
            </div>
          </article>
        </template>
      </div>
    </div>
  </section>

  <section id="projects" class="py-10 border-t border-slate-200/60 dark:border-slate-700/60">
    <div class="mx-auto max-w-6xl px-4">
      <h2 class="text-xl md:text-2xl font-bold mb-6">Projets</h2>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6" id="projectsGrid">
      </div>
    </div>
  </section>

  <footer class="py-8 text-center text-sm opacity-70 border-t">
    <p>© <span x-text="new Date().getFullYear()"></span> <span x-text="data.name"></span></p>
  </footer>

  <script>
    function chips(list = []) {
      return list.map(t => `<span class="inline-flex items-center rounded-full border px-3 py-1 text-sm bg-slate-50 dark:bg-slate-800">${t}</span>`).join("");
    }
    function formatDateRange(start, end) {
      const fmt = (d) => `${d}`.replace(/-/g, "/");
      return `${fmt(start)} – ${end || 'Aujourd\'hui'}`;
    }
    function ui() {
      return {
        data: profileData,
        render() {
          const grid = document.getElementById('projectsGrid');
          if (grid && this.data.projects?.length) {
            grid.innerHTML = this.data.projects.map(p => `
              <article class="rounded-2xl border p-4 hover:shadow transition flex flex-col">
                <h3 class="font-semibold text-lg">${p.title}</h3>
                <p class="mt-1 opacity-80 text-sm">${p.description || ''}</p>
              </article>
            `).join('');
          }
        }
      }
    }
  </script>
</body>
</html>
